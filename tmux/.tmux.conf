# vim: foldmethod=marker

# Remap prefix to ctrl-a and send-prefix to ctrl-a ctrl-a
set -g prefix C-a
bind-key C-a send-prefix
unbind-key C-b

# Use 1 instead of 0 because it's easier to type.
set -g base-index 1

# Use vim-style movement keys to change pane.
bind-key k select-pane -U
bind-key j select-pane -D
bind-key h select-pane -L
bind-key l select-pane -R

# Quicker vertical resizing.
bind-key = resize-pane -U 3
bind-key - resize-pane -D 3

# Create pane above
bind-key K split-window -c "#{pane_current_path}" \; swap-pane -U

# Create pane below
bind-key J split-window -c "#{pane_current_path}"

# Create pane left
bind-key H split-window -h -c "#{pane_current_path}" \; swap-pane -U

# Create pane right
bind-key L split-window -h -c "#{pane_current_path}"

# Next and previous window.
# I bind these in Iterm2 to option-h and option-l.
bind-key C-n next-window
bind-key C-p previous-window

# Switch layouts.
bind-key y next-layout
bind-key o select-layout "active-only"
bind-key O select-layout "main-vertical"

# Easier splits.
bind-key s split-window -v -c "#{pane_current_path}"
bind-key S split-window -h -c "#{pane_current_path}"

# Easier kills.
bind-key q kill-pane
bind-key Q kill-window

# Instant vim pane.
bind-key v split-window -p 25 -v vim

# enable utf8 (removed in > 2.1)
# setw -g utf8 on
setw -g xterm-keys on

# use vi mode in scroll mode and paste mode
setw -g mode-keys vi
# setw -g window-status-current-attr reverse

# Increase history limit.
set -g history-limit 10000

# jpickard: I have a feeling that a non-zero repeat time causes havoc in some
# applications.
setw -g repeat-time 0

# The initial run-shell command is required since 1.9a seems to overwrite
# bytes, leaving later bytes in place.
# TODO: Check if this is still required.
bind C-c run-shell "rm -f /Users/jamespickard/.tmux/buffer" \; save-buffer /Users/jamespickard/.tmux/buffer \; run-shell "cat /Users/jamespickard/.tmux/buffer  | reattach-to-user-namespace pbcopy"
bind C-m capture -S -1000 \; save-buffer /tmp/tmux-make \; delete-buffer

# Set status bar colours.
set -g status-bg black
set -g status-fg white

# Remove clock (causes iTerm2 tab activity).
set -g status-right "#H"

# Inactive windows
set -g window-status-format "#I:#W"

# Active window (highlighted)
set -g window-status-current-format "#[fg=black,bg=green]#I:#W#[default]"

# Pull a pane from another window into this window.
bind-key @ command-prompt -p "create pane from:"  "join-pane -s ':%%'"

# Override t (usually shows the clock) with swap-window.
bind-key t command-prompt "swap-window -t '%%'"

# Word motions are mainly used for directory names.
set -g word-separators '/ @'

# Do not allow windows to be renamed.
# Rename them manually instead.
# jpickard: I have never had automatic naming work work satisfactorily.
set -g allow-rename off

# Fix for neovim colours.
# https://www.reddit.com/r/neovim/comments/3axxaj/no_colors_when_run_inside_tmux/
set -g default-terminal "screen-256color"

# Enable truecolor support http://sunaku.github.io/tmux-24bit-color.html#usage
set-option -ga terminal-overrides ",xterm-256color:Tc"

bind-key u run "tmux copy-mode; tmux send-keys ?"

# Use current pwd.
set-option -g update-environment "DISPLAY PWD"

# Enable mouse.
set -g mouse on

# Copy clipboard.
bind-key C-c run "tmux save-buffer - | pbcopy"

# New windows inherit current path.
bind-key c new-window -c "#{pane_current_path}"

# Indicate current pane
set -g pane-active-border-style "fg=green"
set -g pane-border-style "fg=grey"

# Go to window.
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Make active pane more obvious.
set -g pane-border-lines heavy
set -g pane-border-style 'fg=colour240'
set -g pane-active-border-style 'fg=colour10,bg=default'
set -g window-style 'bg=#333333'
set -g window-active-style 'bg=#000000'

# Scroll 6 lines up/down whether or not you're already in copy mode
bind-key -n M-Up   if-shell -F '#{pane_in_mode}' 'send-keys -X -N 5 scroll-up'   'copy-mode \; send-keys -X -N 5 scroll-up'
bind-key -n M-Down if-shell -F '#{pane_in_mode}' 'send-keys -X -N 5 scroll-down' 'copy-mode \; send-keys -X -N 5 scroll-down'

# ── Session persistence (added 2026-06-29) ──────────────────────────────────
# Survive crashes/reboots: auto-save the tmux layout every 15 min and
# auto-restore it (windows, panes, cwds, scrollback) when the tmux server
# next starts. Combined with `claude --resume`, recovery is near-instant.
# Plugins are PINNED to audited commit SHAs (detached HEAD in ~/.tmux/plugins/*).
# Do NOT update with `prefix + U` — it is intentionally blocked. Updating means
# security-reviewing the upstream diff + a ~7-day cooldown, then re-pinning.
# See PLUGINS-SECURITY.md in this directory for the full policy and pinned SHAs.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ── Claude / tmux improvements (added 2026-07-04) ───────────────────────────
# Scripts live in ~/.tmux/scripts/. Plan + rationale:
# ~/Code/cloudship/2026-07-04-tmux-improvements/plans/2026-07-04-tmux-improvements.md

# #3 Page up/down — Alt-u / Alt-d = half-page scroll (avoids the readline C-u
# conflict). Alt-u enters copy-mode and scrolls up; Alt-d scrolls down while in
# copy-mode but otherwise passes through to the shell (fish kill-word).
bind-key -n M-u copy-mode \; send-keys -X halfpage-up
bind-key -n M-d if-shell -F '#{pane_in_mode}' 'send-keys -X halfpage-down' 'send-keys M-d'

# Meta-m — toggle the current pane between 90% of the window height and its
# previous layout (a softer, reversible zoom vs C-z's 100%). Vertical stacks.
bind-key -n M-m run-shell '/Users/jamespickard/.tmux/scripts/pane-tall.sh'

# #2 Jump to the OLDEST window needing attention (the one shown on status row 2).
# Ctrl-Space as a root binding — press directly, or drive it from an iTerm2 key
# mapping (send text "C-Space" / the raw \x00) just like Option-1 -> M-1.
bind-key -n C-Space run-shell '/Users/jamespickard/.tmux/scripts/jump-oldest.sh'

# #2b Cycle through ALL windows needing attention (bell flag), across sessions.
bind-key a run-shell '/Users/jamespickard/.tmux/scripts/jump-attention.sh'

# Keep the "oldest waiting" status line fresh on bell + window-change events.
set-hook -g alert-bell 'run-shell -b "/Users/jamespickard/.tmux/scripts/attention-line.sh"'
set-hook -g after-select-window 'run-shell -b "/Users/jamespickard/.tmux/scripts/attention-line.sh"'

# #1 Rename current window to its auto name <dir-label>:<Claude task|branch>.
bind-key A run-shell -b '/Users/jamespickard/.tmux/scripts/autoname.sh'

# #6 Reorder + reprefix windows by directory. Lowercase = this session, G = all.
bind-key g run-shell -b '/Users/jamespickard/.tmux/scripts/reorder.sh'
bind-key G run-shell -b '/Users/jamespickard/.tmux/scripts/reorder.sh all'

# #5 Toggle the expanded (3rd) status row.
bind-key e run-shell -b '/Users/jamespickard/.tmux/scripts/toggle-status.sh'

# Popup window switcher: fuzzy list of every window (name + task) across all
# sessions; Enter jumps. prefix+Space.
bind-key Space display-popup -E -b rounded -w 80% -h 70% \
  '/Users/jamespickard/.tmux/scripts/switcher.sh'

# ── Sessions: group + navigate (added 2026-07-23) ───────────────────────────
# A session is either ACTIVE or PARKED (the @parked session option — a label
# only; nothing is detached, hidden or killed). The picker groups on it and
# ( / ) skip parked sessions.
#
# prefix+Tab — session picker popup: grouped active/parked, showing each
# session's projects, window count, waiting (⚑) count and idle time.
# In the picker: enter switches, ctrl-p parks/unparks, ctrl-r auto-names.
bind-key Tab display-popup -E -b rounded -w 70% -h 60% \
  '/Users/jamespickard/.tmux/scripts/sessions.sh'

# prefix+P — park / un-park this SESSION (a label; it stays where it is).
bind-key P run-shell '/Users/jamespickard/.tmux/scripts/session-park.sh toggle'

# prefix+p — park / un-park this WINDOW: move it out of a session that has
# filled up into the shared "parked" session (created on demand), or back to
# the session it came from. Both sessions are renumbered so Alt-1..9 stays
# dense. Bulk version: prefix+Space, tab-select, ctrl-p.
bind-key p run-shell '/Users/jamespickard/.tmux/scripts/window-park.sh toggle'

# prefix+R — rename this session after the projects it holds (e.g. "snib+forge").
bind-key R run-shell '/Users/jamespickard/.tmux/scripts/session-autoname.sh'

# prefix+) / prefix+( — next / previous ACTIVE session (parked ones skipped).
bind-key ) run-shell '/Users/jamespickard/.tmux/scripts/session-cycle.sh next'
bind-key ( run-shell '/Users/jamespickard/.tmux/scripts/session-cycle.sh prev'

# Keybindings cheatsheet popup. prefix+i.
bind-key i display-popup -E -b rounded -w 80% -h 80% \
  '/Users/jamespickard/.tmux/scripts/keys.sh'

# Drop the default "[session] " prefix (status-left) from the picker row.
set -g status-left ""

# #5 Double-height status bar. (No per-tab glyphs — the bell already highlights
# waiting tabs in reverse-white and the current tab is green, so glyphs were
# redundant.) Rows are reversed by status-layout.sh:
#   TOP row    : focused window's Claude task (left) + oldest waiting window (right).
#   BOTTOM row : the window picker (tmux's built-in format, moved down a line).
#   Toggle row : prefix+e reveals every waiting window with its full message.
set -g status 2
run-shell -b '/Users/jamespickard/.tmux/scripts/status-layout.sh'
set -g status-format[2] "#[align=left]#[fg=colour179]#{W:#{?#{==:#{window_bell_flag},1},➤ #{window_index}:#{window_name}: #{@claude_msg}    ,}}"

# Initialize tpm — keep this line at the very bottom of tmux.conf.
run '~/.tmux/plugins/tpm/tpm'
